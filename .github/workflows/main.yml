name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --no-daemon -Dorg.gradle.jvmargs=-Xmx4g

      - name: Show build output (on failure)
        if: failure()
        run: |
          echo "=== Build failed. Listing reports ==="
          find . -name "*.txt" -path "*/build/reports/*" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
          find . -name "*.html" -path "*/build/reports/*" | head -5

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MasarPortal-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
